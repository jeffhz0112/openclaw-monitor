version: '3.8'

services:
  openclaw-monitor:
    build: .
    container_name: openclaw-monitor
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - OPENCLAW_URL=${OPENCLAW_URL:-http://192.168.31.69:18789}
      - OPENCLAW_GATEWAY=${OPENCLAW_GATEWAY:-ws://192.168.31.69:18789}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - CHECK_INTERVAL=${CHECK_INTERVAL:-60}
      - HISTORY_DAYS=${HISTORY_DAYS:-7}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  data:
